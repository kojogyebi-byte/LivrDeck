name: Build LiveDeck for macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Build (universal: Apple Silicon + Intel)"
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Make app icon (.icns)
        run: |
          SRC="Resources/AppIcon-1024.png"
          SET="AppIcon.iconset"
          mkdir -p "$SET"
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz   "$SRC" --out "$SET/icon_${sz}x${sz}.png" >/dev/null
            sips -z $((sz*2)) $((sz*2)) "$SRC" --out "$SET/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          cp "$SRC" "$SET/icon_512x512@2x.png"
          iconutil -c icns "$SET" -o AppIcon.icns

      - name: Assemble .app bundle
        run: |
          APP="LiveDeck.app"
          BIN=".build/apple/Products/Release/LiveDeck"
          if [ ! -f "$BIN" ]; then BIN=$(find .build -name LiveDeck -type f -path "*Release*" | head -1); fi
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/LiveDeck"
          cp Resources/Info.plist "$APP/Contents/Info.plist"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          /usr/bin/codesign --force --deep --sign - "$APP"
          ditto -c -k --keepParent "$APP" LiveDeck-macOS.zip

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: LiveDeck-macOS
          path: LiveDeck-macOS.zip
